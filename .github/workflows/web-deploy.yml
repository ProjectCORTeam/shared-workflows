name: Web Deploy

on: 
  workflow_call:
    inputs: 
      trigger_type:
        required: true
        type: string
      stage:
        required: true
        type: string
        description: "GitHub Environment name (e.g. staging, production, beta)"
      artifact_s3_uri:
        required: true
        type: string
      artifact_s3_key:
        required: true
        type: string
      notifications:
        required: false
        type: boolean
        default: true
        description: "Enable notifications to cloud or team owner flag"
      
    secrets: 
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      STG_AWS_ACCESS_KEY_ID:
        required: true
      STG_AWS_SECRET_ACCESS_KEY:
        required: true
      STG_AWS_REGION:
        required: true
      PROD_AWS_ACCESS_KEY_ID:
        required: true
      PROD_AWS_SECRET_ACCESS_KEY:
        required: true
      PROD_AWS_REGION:
        required: true
      SHARED_AWS_ACCESS_KEY_ID:
        required: true
      SHARED_AWS_SECRET_ACCESS_KEY:
        required: true
      SHARED_AWS_REGION:
        required: true
      GOOGLE_WEBHOOK:
        required: true

jobs:

  aws_codedeploy_deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.stage }}
    name: AWS CodeDeploy Deploy
    env:
      CODEDEPLOY_APP_NAME: ${{ vars.CODEDEPLOY_APP_NAME }}
      CODEDEPLOY_DEPLOYMENT_GROUP: ${{ vars.CODEDEPLOY_DEPLOYMENT_GROUP }}
      CODEDEPLOY_S3_ARTIFACTS: ${{ vars.CODEDEPLOY_S3_ARTIFACTS }}
      ARTIFACT_S3_KEY: ${{ inputs.artifact_s3_key }}
    steps:
      - name: Validate environment variables
        run: |
          set -euo pipefail

          if [[ -z "${CODEDEPLOY_APP_NAME}" || -z "${CODEDEPLOY_DEPLOYMENT_GROUP}" || -z "${CODEDEPLOY_S3_ARTIFACTS}" ]]; then
            echo "ERROR: Missing CodeDeploy variables in GitHub Environment '${{ inputs.stage }}'."
            echo "Configure CODEDEPLOY_APP_NAME, CODEDEPLOY_DEPLOYMENT_GROUP and CODEDEPLOY_S3_ARTIFACTS."
            exit 1
          fi

      - name: Configure AWS Credentials
        if: ${{ contains(fromJSON('["production", "beta"]'), vars.CODEDEPLOY_DEPLOYMENT_GROUP) }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS Credentials
        if: ${{ startsWith(vars.CODEDEPLOY_DEPLOYMENT_GROUP, 'stg') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STG_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STG_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.STG_AWS_REGION }}

      - name: Trigger AWS CodeDeploy
        id: codedeploy
        run: |
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name "${CODEDEPLOY_APP_NAME}" \
            --deployment-config-name CodeDeployDefault.OneAtATime \
            --deployment-group-name "${CODEDEPLOY_DEPLOYMENT_GROUP}" \
            --s3-location "bucket=${CODEDEPLOY_S3_ARTIFACTS},bundleType=tgz,key=${ARTIFACT_S3_KEY}" \
            --description "Deployment triggered by GitHub Actions commit ${{ github.sha }}" \
            --query deploymentId \
            --output text)

          echo "deployment_id=${DEPLOYMENT_ID}" >> "$GITHUB_OUTPUT"
          echo "CodeDeploy deployment triggered: ${DEPLOYMENT_ID}"

      - name: Wait for CodeDeploy deployment
        id: codedeploy-wait
        run: |
          set -euo pipefail

          DEPLOYMENT_ID="${{ steps.codedeploy.outputs.deployment_id }}"
          echo "Waiting for CodeDeploy deployment ${DEPLOYMENT_ID} to complete..."

          if aws deploy wait deployment-successful --deployment-id "${DEPLOYMENT_ID}"; then
            echo "deployment_status=Succeeded" >> "$GITHUB_OUTPUT"
            echo "CodeDeploy deployment ${DEPLOYMENT_ID} succeeded."
            exit 0
          fi

          DEPLOYMENT_STATUS=$(aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.status' \
            --output text)

          DEPLOYMENT_ERROR=$(aws deploy get-deployment \
            --deployment-id "${DEPLOYMENT_ID}" \
            --query 'deploymentInfo.errorInformation.message' \
            --output text)

          echo "deployment_status=${DEPLOYMENT_STATUS}" >> "$GITHUB_OUTPUT"
          echo "deployment_error=${DEPLOYMENT_ERROR:-Unknown error}" >> "$GITHUB_OUTPUT"
          echo "CodeDeploy deployment ${DEPLOYMENT_ID} failed with status: ${DEPLOYMENT_STATUS}"
          echo "Error: ${DEPLOYMENT_ERROR:-Unknown error}"
          exit 1

      - name: Output summary
        if: always()
        run: |
          echo "### Deploy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Stage:** ${{ inputs.stage }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Trigger:** ${{ inputs.trigger_type }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CodeDeploy App:** ${CODEDEPLOY_APP_NAME}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Deployment Group:** ${CODEDEPLOY_DEPLOYMENT_GROUP}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact S3 URI:** ${{ inputs.artifact_s3_uri }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact S3 Key:** ${ARTIFACT_S3_KEY}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **S3 Artifacts:** ${CODEDEPLOY_S3_ARTIFACTS}" >> "$GITHUB_STEP_SUMMARY"

          if [[ -n "${{ steps.codedeploy.outputs.deployment_id }}" ]]; then
            echo "- **Deployment ID:** \`${{ steps.codedeploy.outputs.deployment_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ "${{ steps.codedeploy-wait.outputs.deployment_status }}" == "Succeeded" ]]; then
            echo "- **Deployment Status:** Succeeded" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ CodeDeploy deployment completed successfully." >> "$GITHUB_STEP_SUMMARY"
          elif [[ -n "${{ steps.codedeploy-wait.outputs.deployment_status }}" ]]; then
            echo "- **Deployment Status:** ${{ steps.codedeploy-wait.outputs.deployment_status }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Error:** ${{ steps.codedeploy-wait.outputs.deployment_error }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ CodeDeploy deployment failed." >> "$GITHUB_STEP_SUMMARY"
          elif [[ -n "${{ steps.codedeploy.outputs.deployment_id }}" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠️ CodeDeploy deployment was triggered but did not finish successfully." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "❌ CodeDeploy deployment was not triggered." >> "$GITHUB_STEP_SUMMARY"
          fi
