name: Web Custom Build

on: 
  workflow_call:
    inputs: 
      trigger_type:
        required: true
        type: string
      stage:
        required: false
        type: string
      notifications:
        required: false
        type: boolean
        default: true
        description: "Enable notifications to cloud or team owner flag"
      force_build:
        required: false
        type: boolean
        default: false
        description: "Force build even if artifact and assets already exist"

    outputs:
      env_check:
        description: "Environment status checker"
        value: ${{ jobs.build-push.outputs.env_check }}
      stage:
        description: "Stage name for infrastructure deployment"
        value: ${{ jobs.sets-variables.outputs.STAGE }}
      release_version:
        description: "Semantic versioning for production environment"
        value: ${{ jobs.build-push.outputs.release_version }}
      ARTIFACT_S3_URI:
        description: "Artifact S3 URI"
        value: ${{ jobs.build-push.outputs.ARTIFACT_S3_URI }}
      ARTIFACT_S3_KEY:
        description: "Artifact S3 object key"
        value: ${{ jobs.build-push.outputs.ARTIFACT_S3_KEY }}
    
    secrets: 
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: true
      PROD_AWS_ACCESS_KEY_ID:
        required: true
      PROD_AWS_SECRET_ACCESS_KEY:
        required: true
      PROD_AWS_REGION:
        required: true
      SHARED_AWS_ACCESS_KEY_ID:
        required: true
      SHARED_AWS_SECRET_ACCESS_KEY:
        required: true
      SHARED_AWS_REGION:
        required: true
      GOOGLE_WEBHOOK:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_PASSWORD:
        required: false
      ACTIONS_TOKEN:
        required: true
        description: "Personal Access Token para acceder a repositorios privados"
      NPM_TOKEN:
        required: true
        description: "Private NPM token"

env:
  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

jobs:

  sets-variables:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.stage }}
    name: Sets Variables
    outputs:
      COMMIT_HASH: ${{ steps.get-commit-ids.outputs.COMMIT_HASH }}
      SHORT_COMMIT_HASH: ${{ steps.get-commit-ids.outputs.SHORT_COMMIT_HASH }}
      RELEASE_TAG: ${{ steps.version-tag.outputs.RELEASE_TAG }}
      STAGE: ${{ steps.stage.outputs.STAGE }}
      STAGE_SHORT: ${{ steps.stage.outputs.STAGE_SHORT }}
      BRANCH_NAME: ${{ steps.extract_branch_trunk.outputs.BRANCH_NAME }}
    steps:   
      - name: Check Inputs
        id: check-inputs
        run: |
          echo "Checking job inputs...."
          echo "trigger_type: ${{inputs.trigger_type}}"
          echo "input stage: ${{inputs.stage}}"
          echo "notifications: ${{inputs.notifications}}"
          echo "is prerelease: " ${{github.event.release.prerelease}}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get Commit Hash
        id: get-commit-ids
        run: |
          echo "COMMIT_HASH=${{ github.sha }}" >> $GITHUB_ENV
          echo "COMMIT_HASH=${{ github.sha }}" >> $GITHUB_OUTPUT

          short_commit_hash=$(echo ${{ github.sha }} | cut -c 1-7)
          echo "SHORT_COMMIT_HASH=$short_commit_hash" >> $GITHUB_ENV
          echo "SHORT_COMMIT_HASH=$short_commit_hash" >> $GITHUB_OUTPUT

          echo "Commit Hash: ${{env.COMMIT_HASH}}"
          echo "Short Commit Hash: ${{env.SHORT_COMMIT_HASH}}"

      - name: Get version tag
        continue-on-error: true
        id: version-tag
        run: |
          echo "RELEASE_TAG=null" >> $GITHUB_ENV
          echo "RELEASE_TAG=null" >> $GITHUB_OUTPUT
          tag=$(git describe --exact-match --tags HEAD)
          if [[ -n "$tag" ]]; then
              echo "Current commit has a tag: $tag"
              echo "RELEASE_TAG=$tag"
              echo "RELEASE_TAG=$tag" >> $GITHUB_ENV
              echo "RELEASE_TAG=$tag" >> $GITHUB_OUTPUT
              echo "RELEASE_VERSION=$tag" >> $GITHUB_ENV
              echo "RELEASE_VERSION=$tag" >> $GITHUB_OUTPUT
          else
              echo "Current commit does not have a tag"
          fi

      - name: Get stage
        id: stage
        env:
          STAGE_INPUT: ${{ inputs.stage }}
        run: |
          if [[ -z "$STAGE_INPUT" ]]; then
            echo "STAGE_INPUT is empty. Defaulting to prod."
            echo "ENVIRONMENT=prod" >> $GITHUB_ENV
            if [[ "${{ github.event_name }}" == 'release' && "${{ github.event.release.prerelease }}" == true ]]; then
              echo "This is a pre-release."
              echo "STAGE=beta" >> $GITHUB_ENV
              echo "STAGE=beta" >> $GITHUB_OUTPUT
              echo "STAGE_SHORT=$STAGE_INPUT" >> $GITHUB_ENV
              echo "STAGE_SHORT=$STAGE_INPUT" >> $GITHUB_OUTPUT
              elif [[ "${{ github.event_name }}" == 'release' ]]; then
              echo "This is a full release."
              echo "STAGE=production" >> $GITHUB_ENV
              echo "STAGE=production" >> $GITHUB_OUTPUT
              echo "STAGE_SHORT=$STAGE_INPUT" >> $GITHUB_ENV
              echo "STAGE_SHORT=$STAGE_INPUT" >> $GITHUB_OUTPUT
            fi
          else
            if [[ "$STAGE_INPUT" =~ ^staging([1-9]|10)?$ ]]; then
              STAGE=${STAGE_INPUT/staging/}
              echo "ENVIRONMENT=staging" >> $GITHUB_ENV
              echo "STAGE=$STAGE_INPUT" >> $GITHUB_ENV
              echo "STAGE=$STAGE_INPUT" >> $GITHUB_OUTPUT
              echo "STAGE_SHORT=st$STAGE" >> $GITHUB_ENV
              echo "STAGE_SHORT=st$STAGE" >> $GITHUB_OUTPUT
              echo "Se está ejecutando como staging"
            else
              echo "Invalid STAGE_INPUT format. Defaulting to prod."
              echo "ENVIRONMENT=prod" >> $GITHUB_ENV
              echo "STAGE=$STAGE_INPUT" >> $GITHUB_ENV
              echo "STAGE=$STAGE_INPUT" >> $GITHUB_OUTPUT
              echo "STAGE_SHORT=$STAGE_INPUT" >> $GITHUB_ENV
              echo "STAGE_SHORT=$STAGE_INPUT" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Extract branch name
        id: extract_branch_trunk
        shell: bash
        run: |
          echo "BRANCH_NAME=$GITHUB_REF_NAME" 
          echo "BRANCH_NAME=$GITHUB_REF_NAME" >> $GITHUB_ENV 
          echo "BRANCH_NAME=$GITHUB_REF_NAME" >> $GITHUB_OUTPUT 

  build-push:
    runs-on: ubuntu-26-large
    environment:
      name: ${{ inputs.stage }}
    name: Build and Push Artifacts to S3
    needs: [sets-variables]
    outputs:
      release_version: ${{ steps.set-release-version.outputs.RELEASE_VERSION }}
      env_check: ${{ steps.build-complete.outputs.env_check }}
      ARTIFACT_S3_URI: ${{ steps.check-existing-build.outputs.ARTIFACT_S3_URI }}
      ARTIFACT_S3_KEY: ${{ steps.check-existing-build.outputs.ARTIFACT_S3_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup AWS CLI
        run: |
          if command -v aws &> /dev/null; then
              echo "✓ AWS CLI ya instalado"
              aws --version
          else
              echo "✗ AWS CLI no encontrado. Instalando..."
              curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
              unzip awscliv2.zip
              sudo ./aws/install
              rm -rf aws awscliv2.zip
              echo "✓ AWS CLI instalado"
              aws --version
          fi
      
      - name: Configure AWS Credentials - STG
        if: ${{ contains(inputs.stage, 'staging') }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STG_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STG_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.STG_AWS_REGION }}

      - name: Configure AWS Credentials - PROD
        if: ${{ contains(fromJSON('["production", "beta"]'), inputs.stage) }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      
      - name: Sync environment variables 
        id: sync-environment-variables
        run: |
          ENV_SECRET_ARN="${{ vars.env_secret_arn }}"
          if [[ -z "${ENV_SECRET_ARN}" ]]; then
            echo "ERROR: vars.env_secret_arn is empty."
            echo "Configure the variable 'env_secret_arn' in GitHub Environment '${{ inputs.stage }}' (repo Web, not shared-workflows)."
            exit 1
          fi

          aws secretsmanager get-secret-value \
            --region us-east-2 \
            --secret-id "${ENV_SECRET_ARN}" \
            --query SecretString --output text \
            | jq -r 'to_entries | .[] | "\(.key)=\(.value)"' > .env

      - name: Set release version
        id: set-release-version
        run: |
          if [[ "${{ inputs.stage }}" =~ ^staging ]]; then
            RELEASE_VERSION=${{ needs.sets-variables.outputs.SHORT_COMMIT_HASH}}
            RUN_ENV="staging"
          elif [[ "${{ inputs.stage }}" == "production" ]] || [[ "${{ inputs.stage }}" == "beta" ]] || [[ -z "${{ inputs.stage }}" ]]; then
            RELEASE_VERSION=${{ needs.sets-variables.outputs.RELEASE_TAG }}
            RUN_ENV="prod"
          fi
          
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "RUN_ENV=$RUN_ENV" >> $GITHUB_ENV
          echo "RUN_ENV=$RUN_ENV" >> $GITHUB_OUTPUT
          echo "Final release version: $RELEASE_VERSION"
          echo "Environment: $RUN_ENV"

      - name: Prepare .env for build
        run: |
          echo "${{ needs.sets-variables.outputs.SHORT_COMMIT_HASH }}" > .version
          VERSION=${{ needs.sets-variables.outputs.SHORT_COMMIT_HASH }}
          sed -i 's/\r//' .env
          sed -i "s/{{VERSION}}/${VERSION}/g" .env

      - name: Check existing artifact and assets
        id: check-existing-build
        env:
          STAGE: ${{ needs.sets-variables.outputs.STAGE }}
          STAGE_SHORT: ${{ needs.sets-variables.outputs.STAGE_SHORT }}
          SHORT_COMMIT: ${{ needs.sets-variables.outputs.SHORT_COMMIT_HASH }}
        run: |
          set -euo pipefail

          STG_KEY="${STAGE/staging/stg}"
          ARTIFACT="cor-stg-us1-ms-web-${STG_KEY}-${SHORT_COMMIT}.tar.gz"
          S3_KEY="${STG_KEY}/${ARTIFACT}"
          S3_URI="s3://cor-stg-us1-ms-web-all/${S3_KEY}"
          CDN_BUCKET=$(grep '^CDN_Bucket=' .env | cut -d= -f2- | tr -d '"' | tr -d "'")
          CDN_UPLOAD_FOLDER=$(grep '^AWS_CDN_ASSET_UPLOAD_FOLDER=' .env | cut -d= -f2- | tr -d '"' | tr -d "'")
          CDN_REGION="${CDN_REGION:-us-east-1}"

          ARTIFACT_EXISTS=false
          ASSETS_EXIST=false

          if aws s3 ls "${S3_URI}" >/dev/null 2>&1; then
            echo "Artifact already exists: ${S3_URI}"
            ARTIFACT_EXISTS=true
          else
            echo "Artifact not found: ${S3_URI}"
          fi

          if [[ -n "${CDN_BUCKET}" && -n "${CDN_UPLOAD_FOLDER}" ]]; then
            if aws s3 ls "s3://${CDN_BUCKET}/${CDN_UPLOAD_FOLDER}" --region "${CDN_REGION}" 2>/dev/null | grep -q .; then
              echo "Assets already exist: s3://${CDN_BUCKET}/${CDN_UPLOAD_FOLDER}"
              ASSETS_EXIST=true
            else
              echo "Assets not found: s3://${CDN_BUCKET}/${CDN_UPLOAD_FOLDER}"
            fi
          else
            echo "CDN_Bucket or AWS_CDN_ASSET_UPLOAD_FOLDER missing in .env; skipping assets check"
          fi

          echo "ARTIFACT=${ARTIFACT}" >> "$GITHUB_ENV"
          echo "ARTIFACT_S3_URI=${S3_URI}" >> "$GITHUB_ENV"
          echo "ARTIFACT_S3_KEY=${S3_KEY}" >> "$GITHUB_ENV"
          echo "ARTIFACT_S3_URI=${S3_URI}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_S3_KEY=${S3_KEY}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_EXISTS=${ARTIFACT_EXISTS}" >> "$GITHUB_ENV"
          echo "ASSETS_EXIST=${ASSETS_EXIST}" >> "$GITHUB_ENV"

          if [[ "${{ inputs.force_build }}" == "true" ]]; then
            echo "Build forced by input"
            echo "BUILD_REQUIRED=true" >> "$GITHUB_ENV"
          elif [[ "${RUN_ENV}" == "staging" && "${ARTIFACT_EXISTS}" == "true" && "${ASSETS_EXIST}" == "true" ]]; then
            echo "Artifact and assets already exist; skipping build"
            echo "BUILD_REQUIRED=false" >> "$GITHUB_ENV"
          else
            echo "Build required"
            echo "BUILD_REQUIRED=true" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS Credentials - Shared (for ECR)
        if: env.BUILD_REQUIRED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.SHARED_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.SHARED_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.SHARED_AWS_REGION }}

      - name: Login to Amazon ECR
        if: env.BUILD_REQUIRED == 'true'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      - name: Download base image from ECR
        if: env.BUILD_REQUIRED == 'true'
        id: download-base-image
        run: |
          docker pull 170071165762.dkr.ecr.us-east-2.amazonaws.com/cor-shared-us-east-2-ms-web-base:latest

      - name: Configure AWS Credentials for artifact upload
        if: env.BUILD_REQUIRED == 'true' && contains(inputs.stage, 'staging')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.STG_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.STG_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.STG_AWS_REGION }}

      - name: Configure AWS Credentials for artifact upload
        if: env.BUILD_REQUIRED == 'true' && (contains(fromJSON('["production", "beta"]'), inputs.stage) || inputs.stage == '')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.PROD_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.PROD_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.PROD_AWS_REGION }}

      - name: Build artifacts with Docker and upload to S3
        if: env.BUILD_REQUIRED == 'true'
        id: build-artifacts
        run: |
          set -euo pipefail

          IMAGE_TAG="cor-web-build:${RELEASE_VERSION}"
          ARTIFACT="${{ env.ARTIFACT }}"
          S3_URI="${{ env.ARTIFACT_S3_URI }}"

          echo "Building Docker image ${IMAGE_TAG}..."
          docker build \
            --build-arg NPM_TOKEN="${NPM_TOKEN}" \
            --build-arg AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}" \
            --build-arg AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}" \
            --build-arg AWS_SESSION_TOKEN="${AWS_SESSION_TOKEN:-}" \
            --build-arg AWS_DEFAULT_REGION="${AWS_DEFAULT_REGION}" \
            -t "${IMAGE_TAG}" \
            -f Dockerfile .

          echo "Extracting build output from container..."
          CONTAINER_ID=$(docker create "${IMAGE_TAG}")
          rm -rf artifact-output
          mkdir -p artifact-output
          docker cp "${CONTAINER_ID}:/var/www/." artifact-output/
          docker rm "${CONTAINER_ID}"

          
          echo "Packaging artifact ${ARTIFACT} (excluding node_modules)..."
          rm -rf artifact-output/node_modules
          (
            cd artifact-output
            tar -czf "../${ARTIFACT}" \
              --exclude='node_modules' \
              --exclude='storage' \
              --exclude='vendor' \
              --exclude='.infra/cicd' \
              --exclude='.infra/kubernetes' \
              --exclude='.infra/terraform' \
              --exclude='.infra/*.json' \
              --exclude='assume-role-output.json' \
              --exclude='artifact-output' \
              --exclude='.env' \
              --exclude='.git' \
              .
          )

          echo "Uploading artifact to ${S3_URI}..."
          aws s3 cp "${ARTIFACT}" "${S3_URI}"

          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "artifact_s3_uri=${S3_URI}" >> "$GITHUB_OUTPUT"

      - name: Build complete
        id: build-complete
        run: |
          echo "env_check=success" >> $GITHUB_OUTPUT

      - name: Google Chat Notification - Build Success
        if: inputs.notifications && env.BUILD_REQUIRED == 'true'
        uses: nakamuraos/google-chat-notifications@v2.1.0
        with:
          title: Build Success
          subtitle: ${{ env.RELEASE_VERSION }}
          webhookUrl: ${{ secrets.GOOGLE_WEBHOOK }}
          status: 'success'

      - name: Google Chat Notification - Build Skipped
        if: inputs.notifications && env.BUILD_REQUIRED == 'false'
        uses: nakamuraos/google-chat-notifications@v2.1.0
        with:
          title: Build Skipped
          subtitle: ${{ env.RELEASE_VERSION }} already exists
          webhookUrl: ${{ secrets.GOOGLE_WEBHOOK }}
          status: 'success'

      - name: Output summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ needs.sets-variables.outputs.BRANCH_NAME }}" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.sets-variables.outputs.RELEASE_TAG }}" != "null" ]]; then
            echo "- **Tag:** ${{ needs.sets-variables.outputs.RELEASE_TAG }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Stage:** ${{ needs.sets-variables.outputs.STAGE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Release Version:** ${{ env.RELEASE_VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ env.RUN_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Required:** ${{ env.BUILD_REQUIRED }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Forced:** ${{ inputs.force_build }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact Exists:** ${{ env.ARTIFACT_EXISTS }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Assets Exist:** ${{ env.ASSETS_EXIST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact:** ${{ env.ARTIFACT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifact S3 URI:** ${{ env.ARTIFACT_S3_URI }}" >> $GITHUB_STEP_SUMMARY
